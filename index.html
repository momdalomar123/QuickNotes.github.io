<!DOCTYPE html>
<html lang="en" >
<head>
<script>
const savedTheme = localStorage.getItem('theme');

if (savedTheme === 'darkMode') {
    document.documentElement.classList.add('dark-background-button');
    document.documentElement.classList.add('dark-background-header');
} 
else {
    document.documentElement.classList.add('light-background-button');
    document.documentElement.classList.add('light-background-header');
}
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick-Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel ="stylesheet"href="Quick-Notes/Quick-Notes.css">
    <link rel="icon" href="Quick Notes Logo Icon.png">
    
</head>
<body id="body-id">
    
    <header>
       <div class="header-container" id="header-container-id">
         <h1 style="margin-left: 10px;">
            Quick Notes
        </h1>
        <div class="header-buttons-container">
        <button class="add-note-button-header" id="header-add-button" onclick="
        openDialog() 
        restoreAddButtonAndInputs()
        clearWarningMessages()">
            Add a Note
        </button>
        <button class="dark-light-button-style" id="dark-light-button" type="button">
            Dark
        </button>
        </div>
       </div>
    </header>
      <main>
        <div class="grid-notes" id="grid-notes-template">

        </div>
        
    </main>
    <dialog id="dialog-add-note" class="dialog-style">
        <h1>
            Add a Note
        </h1>
        <div class="title-title-input-container">
        <h2>
            Name
        </h2>
        <p id="title-needed-message"
        style="color: rgb(209, 67, 67);font-size: 17px;font-weight: bold;">

        </p>
        <input class="note-title-style"id="input-title-note" >
        </div>
        <div class="description-title-input-container">
        <h2>
            Description
        </h2>
        <p id="description-needed-message" style="color: rgb(209, 67, 67);font-size: 17px;font-weight: bold;">

        </p>
        <textarea class="note-description-style"id="input-description-note" ></textarea>
        </div>
        <div style="margin-top: 10px;" class="add-cancel-confirm-container">
        <button class="add-note-confirm-button-style"id="add-note-confirm-button">
            Add
        </button>
        <button class="add-note-confirm-button-style toggle-display"id="confirm-note-button">
            Confirm
        </button>
        <button class="cancel-note-button-style"id="cancel-note-button">
            Cancel
        </button>
        <input type="color" id="note-background-color-picker">
        </div>
    </dialog>
  
 
    <script src="Quick-Notes/Quick-Notes.js">
        
    </script>
</body>
</html>
